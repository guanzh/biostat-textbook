<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="wobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="17"/>
      <feDisplacementMap in="SourceGraphic" scale="2.5"/>
    </filter>
  </defs>
  <g filter="url(#wobble)" fill="none" stroke="#1a1a1a" stroke-width="3"
     stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="100" cy="143" rx="40" ry="35" fill="#1a1a1a"/>
    <circle cx="100" cy="82" r="36" fill="#1a1a1a"/>
    <path d="M 72 57 L 67 34 L 88 54 Z" fill="#1a1a1a"/>
    <path d="M 128 57 L 133 34 L 112 54 Z" fill="#1a1a1a"/>
    <path d="M 74 52 L 72 42 L 82 52 Z" fill="#f8bbd0" stroke="none"/>
    <path d="M 126 52 L 128 42 L 118 52 Z" fill="#f8bbd0" stroke="none"/>
    <ellipse cx="86" cy="80" rx="5" ry="8" fill="#ffd54f" stroke="none"/>
    <ellipse cx="114" cy="80" rx="5" ry="8" fill="#ffd54f" stroke="none"/>
    <ellipse cx="86" cy="82" rx="2" ry="5" fill="#1a1a1a" stroke="none"/>
    <ellipse cx="114" cy="82" rx="2" ry="5" fill="#1a1a1a" stroke="none"/>
    <path d="M 97 94 L 100 97 L 103 94 Z" fill="#ef5350" stroke="none"/>
    <!-- 张嘴说话 -->
    <ellipse cx="100" cy="102" rx="4" ry="3" fill="#ffffff" stroke="#ffffff"/>
    <line x1="65" y1="94" x2="50" y2="90"/>
    <line x1="135" y1="94" x2="150" y2="90"/>
    <!-- 举旗的右爪 -->
    <ellipse cx="138" cy="55" rx="9" ry="12" fill="#1a1a1a"/>
    <!-- 旗杆 -->
    <line x1="138" y1="50" x2="138" y2="2" stroke="#1a1a1a" stroke-width="3"/>
    <!-- 静止爪 -->
    <ellipse cx="78" cy="162" rx="10" ry="13" fill="#1a1a1a"/>
    <!-- 尾巴 -->
    <path d="M 138 153 Q 175 145 170 110" stroke="#1a1a1a" stroke-width="10" fill="none"/>
  </g>
  <!-- 黄色小旗 + 红色感叹号 -->
  <g filter="url(#wobble)">
    <path d="M 138 5 L 178 12 L 170 25 L 178 40 L 138 33 Z"
          fill="#ffd54f" stroke="#1a1a1a" stroke-width="2.5"/>
  </g>
  <text x="150" y="29" font-family="Caveat, cursive" font-size="24"
        font-weight="bold" fill="#ef5350">!</text>
</svg>
