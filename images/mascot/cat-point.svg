<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="wobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="11"/>
      <feDisplacementMap in="SourceGraphic" scale="2.5"/>
    </filter>
  </defs>
  <g filter="url(#wobble)" fill="none" stroke="#1a1a1a" stroke-width="3"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- 身体 -->
    <ellipse cx="90" cy="138" rx="42" ry="38" fill="#1a1a1a"/>
    <!-- 头 -->
    <circle cx="90" cy="80" r="38" fill="#1a1a1a"/>
    <path d="M 60 55 L 55 30 L 78 50 Z" fill="#1a1a1a"/>
    <path d="M 120 55 L 125 30 L 102 50 Z" fill="#1a1a1a"/>
    <path d="M 62 50 L 60 38 L 72 48 Z" fill="#f8bbd0" stroke="none"/>
    <path d="M 118 50 L 120 38 L 108 48 Z" fill="#f8bbd0" stroke="none"/>
    <!-- 异色瞳，专注 -->
    <ellipse cx="76" cy="78" rx="6" ry="9" fill="#ffd54f" stroke="none"/>
    <ellipse cx="104" cy="78" rx="6" ry="9" fill="#ffd54f" stroke="none"/>
    <ellipse cx="76" cy="82" rx="2" ry="5" fill="#1a1a1a" stroke="none"/>
    <ellipse cx="104" cy="82" rx="2" ry="5" fill="#1a1a1a" stroke="none"/>
    <path d="M 87 92 L 90 96 L 93 92 Z" fill="#ef5350" stroke="none"/>
    <line x1="55" y1="92" x2="40" y2="88"/>
    <line x1="125" y1="92" x2="140" y2="88"/>
    <!-- 伸出指引的爪 -->
    <ellipse cx="155" cy="120" rx="14" ry="9" fill="#1a1a1a"/>
    <!-- 静止爪 -->
    <ellipse cx="68" cy="160" rx="10" ry="13" fill="#1a1a1a"/>
    <!-- 尾巴 -->
    <path d="M 60 145 Q 25 140 30 105" stroke="#1a1a1a" stroke-width="10" fill="none"/>
  </g>
  <!-- 指尖红色小箭头（强调指引方向） -->
  <path d="M 168 120 L 180 116 L 180 124 Z" fill="#ef5350" stroke="#ef5350" stroke-width="2"/>
</svg>
