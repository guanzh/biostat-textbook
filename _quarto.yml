project:
  type: book
  output-dir: _site

book:
  title: "从样地到结论：保护生物学数据实战"
  subtitle: "基于 R 语言的生物实验设计与统计分析"
  author: "管振华"
  date: "2026"
  language: zh
  
  chapters:
    - index.qmd
    
    - part: "第一篇：从保护问题进入统计"
      chapters:
        - chapters/01-role-of-statistics.qmd
        - chapters/02-variables-hypotheses.qmd
        - chapters/03-experimental-design.qmd
    
    - part: "第二篇：看懂并整理保护数据"
      chapters:
        - chapters/04-data-management.qmd
        - chapters/05-descriptive-statistics.qmd
        - chapters/06-sampling-error.qmd
        - chapters/07-data-visualization.qmd
    
    - part: "第三篇：回答常见保护问题"
      chapters:
        - chapters/08-two-group-comparison.qmd
        - chapters/09-anova.qmd
        - chapters/10-categorical-data.qmd
        - chapters/11-correlation-regression.qmd
        - chapters/12-glm-intro.qmd
    
    - part: "第四篇：保护专业应用"
      chapters:
        - chapters/13-forest-plant-protection.qmd
        - chapters/14-wildlife-survey.qmd
        - chapters/15-biodiversity-data.qmd
        - chapters/16-treatment-evaluation.qmd
        - chapters/17-stats-to-action.qmd
    
    - part: "第五篇：现代生态统计与继续学习"
      chapters:
        - chapters/18-mixed-models.qmd
        - chapters/19-ecological-processes.qmd
        - chapters/20-bayesian-intro.qmd
        - chapters/21-spatiotemporal.qmd
        - chapters/22-ai-assisted-learning.qmd
    
    - part: "附录"
      chapters:
        - appendices/r-basics.qmd
        - appendices/method-map.qmd
        - appendices/glossary.qmd
        - appendices/reproducible-template.qmd
        - appendices/data-ethics.qmd
        - appendices/ai-checklist.qmd
        - appendices/learning-pathway.qmd

  downloads: [pdf, epub]

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: false
    code-fold: true
    code-tools: true
    code-link: true
    code-copy: true
    css: styles.css
  pdf:
    documentclass: scrbook
    toc: true
    number-sections: false

