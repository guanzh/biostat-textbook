<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正态分布可视化 · Normal Distribution</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0d1117;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; overflow: hidden;
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
  }
  .stage-wrap {
    position: relative;
    box-shadow: 0 0 80px rgba(0,0,0,0.5);
    border-radius: 4px; overflow: hidden;
  }
  canvas { display: block; }

  /* Controls */
  .controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(13,17,23,0.92); backdrop-filter: blur(12px);
    padding: 14px 24px; display: flex; align-items: center; gap: 16px;
    color: #e0e4e8; font-size: 13px; z-index: 100;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .controls button {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: #d0d8e0; padding: 7px 16px; border-radius: 5px;
    cursor: pointer; font-size: 13px; font-family: inherit;
    transition: background 0.15s;
  }
  .controls button:hover { background: rgba(255,255,255,0.15); }
  .time-display {
    font-family: "SF Mono", "Consolas", monospace;
    font-variant-numeric: tabular-nums; min-width: 90px; color: #8899aa;
  }
  .scrubber {
    flex: 1; height: 5px; background: rgba(255,255,255,0.12);
    border-radius: 3px; position: relative; cursor: pointer;
  }
  .scrubber-fill {
    position: absolute; top: 0; left: 0; height: 100%;
    background: #5b9bd5; border-radius: 3px; transition: width 0.05s linear;
  }
  .title-overlay {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    text-align: center; pointer-events: none; z-index: 10;
  }
  .title-overlay h1 {
    font-size: 72px; font-weight: 900; color: #e0e4e8;
    letter-spacing: 0.08em; margin: 0; line-height: 1.2;
    white-space: nowrap;
  }
  .title-overlay p {
    font-size: 20px; font-weight: 300; color: #8899aa;
    font-family: "Georgia", "Times New Roman", serif;
    font-style: italic; margin-top: 10px; letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .watermark {
    position: absolute; bottom: 28px; right: 36px;
    font-size: 12px; color: rgba(255,255,255,0.18);
    font-family: "SF Mono", "Consolas", monospace;
    letter-spacing: 0.12em; pointer-events: none; z-index: 10;
  }
</style>
</head>
<body>

<div class="stage-wrap" id="stageWrap">
  <canvas id="mainCanvas"></canvas>
  <div class="title-overlay" id="titleOverlay">
    <h1>正态分布</h1>
    <p>Normal Distribution · μ = 0, σ = 1</p>
  </div>
  <div class="watermark" id="watermark">Created by Huashu-Design</div>
</div>

<div class="controls">
  <button id="btnPlay">⏸ 暂停</button>
  <button id="btnReplay">⏮ 重播</button>
  <div class="time-display" id="timeDisplay">0.0s / 22.0s</div>
  <div class="scrubber" id="scrubber">
    <div class="scrubber-fill" id="scrubFill"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// Normal Distribution Animation
// Pure vanilla JS · Canvas · No dependencies
// ═══════════════════════════════════════════════════════════

(function() {
  // ── DOM refs ──
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  const stageWrap = document.getElementById('stageWrap');
  const titleOverlay = document.getElementById('titleOverlay');
  const watermark = document.getElementById('watermark');
  const btnPlay = document.getElementById('btnPlay');
  const btnReplay = document.getElementById('btnReplay');
  const timeDisplay = document.getElementById('timeDisplay');
  const scrubFill = document.getElementById('scrubFill');
  const scrubber = document.getElementById('scrubber');

  // ── Stage constants ──
  const STAGE_W = 1920;
  const STAGE_H = 1080;
  const DURATION = 10;
  const SQRT_2PI = Math.sqrt(2 * Math.PI);

  // ── State ──
  let time = 0;
  let playing = true;
  let lastTick = null;

  // ── Normal PDF ──
  function normalPDF(x, mu=0, sigma=1) {
    const z = (x - mu) / sigma;
    return Math.exp(-0.5 * z * z) / (sigma * SQRT_2PI);
  }

  // ── Easing: expoOut ──
  function expoOut(t) {
    return t <= 0 ? 0 : t >= 1 ? 1 : 1 - Math.pow(2, -10 * t);
  }

  // ── Interpolate ──
  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp01(x) { return Math.max(0, Math.min(1, x)); }

  // ── Resize ──
  function resize() {
    const vw = window.innerWidth;
    const vh = window.innerHeight - 56; // controls height
    const scale = Math.min(vw / STAGE_W, vh / STAGE_H);
    const displayW = Math.round(STAGE_W * scale);
    const displayH = Math.round(STAGE_H * scale);
    canvas.width = STAGE_W;
    canvas.height = STAGE_H;
    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
    stageWrap.style.width = displayW + 'px';
    stageWrap.style.height = displayH + 'px';
    // Scale title overlay
    titleOverlay.style.transform = `translate(-50%,-50%) scale(${scale})`;
    watermark.style.transform = `scale(${scale})`;
    watermark.style.transformOrigin = 'bottom right';
  }
  resize();
  window.addEventListener('resize', resize);

  // ═══════════════════════════════════════════════════════
  // DRAW
  // ═══════════════════════════════════════════════════════
  function draw(t) {
    const W = STAGE_W;
    const H = STAGE_H;
    ctx.clearRect(0, 0, W, H);

    // ── Background ──
    ctx.fillStyle = '#1a1d20';
    ctx.fillRect(0, 0, W, H);

    // ── Plot layout ──
    const margin = { left: 280, right: 280, top: 160, bottom: 360 };
    const pw = W - margin.left - margin.right;
    const ph = H - margin.top - margin.bottom;
    const xMin = -4.2, xMax = 4.2;
    const yMax = 0.44;

    function xToPx(x) { return margin.left + ((x - xMin) / (xMax - xMin)) * pw; }
    function yToPx(y) { return margin.top + ph - (y / yMax) * ph; }

    // ═══════════════════════════ Phase 1: Axes (2.5-5.0s) ═══
    if (t >= 0.8) {
      const ap = expoOut(clamp01((t - 0.8) / 1.0));
      ctx.save();
      ctx.globalAlpha = ap;
      ctx.strokeStyle = '#556677';
      ctx.lineWidth = 1.5;

      // X-axis
      const x0 = xToPx(xMin), x1 = xToPx(xMax);
      const yAxis = yToPx(0);
      ctx.beginPath();
      ctx.moveTo(x0, yAxis);
      ctx.lineTo(x1, yAxis);
      ctx.stroke();

      // X arrowhead
      ctx.beginPath();
      ctx.moveTo(x1, yAxis);
      ctx.lineTo(x1 - 14, yAxis - 7);
      ctx.lineTo(x1 - 14, yAxis + 7);
      ctx.closePath();
      ctx.fillStyle = '#556677';
      ctx.fill();

      // X tick marks
      ctx.fillStyle = '#8899aa';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for (let xi = -3; xi <= 3; xi++) {
        if (xi === 0) continue;
        const px = xToPx(xi);
        ctx.beginPath();
        ctx.moveTo(px, yAxis);
        ctx.lineTo(px, yAxis + 8);
        ctx.stroke();
        ctx.font = '20px "Georgia", "Times New Roman", serif';
        ctx.fillText(String(xi), px, yAxis + 14);
      }

      // Y-axis
      const y1 = yToPx(yMax);
      ctx.beginPath();
      ctx.moveTo(xToPx(0), yAxis);
      ctx.lineTo(xToPx(0), y1);
      ctx.stroke();

      // Y-axis label (rotated)
      ctx.save();
      ctx.translate(margin.left - 70, margin.top + ph/2);
      ctx.rotate(-Math.PI/2);
      ctx.font = '18px "Microsoft YaHei", "PingFang SC", sans-serif';
      ctx.fillStyle = '#667788';
      ctx.textAlign = 'center';
      ctx.fillText('概率密度', 0, 0);
      ctx.restore();

      // X-axis label
      ctx.font = '18px "Microsoft YaHei", "PingFang SC", sans-serif';
      ctx.fillStyle = '#667788';
      ctx.fillText('标准差 (σ)', xToPx(0), yAxis + 45);

      ctx.restore();
    }

    // ═══════════════════════════ Phase 2: Bell curve (4.0-7.0s) ═══
    if (t >= 1.2) {
      const cp = expoOut(clamp01((t - 1.2) / 1.2));
      const N = 600;
      const drawTo = Math.floor(cp * N);

      ctx.save();
      ctx.strokeStyle = '#d0d8e0';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();

      let started = false;
      for (let i = 0; i <= drawTo; i++) {
        const x = xMin + (xMax - xMin) * (i / N);
        const y = normalPDF(x);
        const px = xToPx(x);
        const py = yToPx(y);
        if (!started) { ctx.moveTo(px, py); started = true; }
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.restore();
    }

    // ═══════════════════════════ Phase 3: μ marker (6.5-8.0s) ═══
    if (t >= 2.0) {
      const mp = expoOut(clamp01((t - 2.0) / 0.6));
      ctx.save();
      ctx.globalAlpha = mp;
      ctx.setLineDash([8, 6]);
      ctx.strokeStyle = '#8899aa';
      ctx.lineWidth = 1.5;
      const mx = xToPx(0);
      ctx.beginPath();
      ctx.moveTo(mx, yToPx(0));
      ctx.lineTo(mx, yToPx(normalPDF(0)));
      ctx.stroke();
      ctx.setLineDash([]);

      // μ label
      ctx.font = 'italic 28px "Georgia", "Times New Roman", serif';
      ctx.fillStyle = '#c0d0e0';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText('μ', mx, yToPx(normalPDF(0)) - 10);

      // 0 label on axis
      ctx.font = '20px "Georgia", "Times New Roman", serif';
      ctx.fillStyle = '#8899aa';
      ctx.textBaseline = 'top';
      ctx.fillText('0', mx, yToPx(0) + 14);

      ctx.restore();
    }

    // ═══════════════════════════ Phase 4: σ bands (8.0-15.5s) ═══
    const bandDefs = [
      { sigma:1, startT:2.5,  endT:4.0,  pct:'68.27%', color:'rgba(91,155,213,0.35)' },
      { sigma:2, startT:3.6,  endT:5.3,  pct:'95.45%', color:'rgba(91,155,213,0.22)' },
      { sigma:3, startT:4.8,  endT:6.5,  pct:'99.73%', color:'rgba(91,155,213,0.12)' },
    ];

    for (const band of bandDefs) {
      if (t < band.startT) continue;
      const bp = expoOut(clamp01((t - band.startT) / (band.endT - band.startT)));
      const s = band.sigma;

      // Fill band
      ctx.save();
      ctx.globalAlpha = bp;
      ctx.fillStyle = band.color;
      ctx.beginPath();
      const samples = 200;
      for (let i = 0; i <= samples; i++) {
        const x = -s + 2*s * (i/samples);
        const y = normalPDF(x);
        if (i === 0) ctx.moveTo(xToPx(x), yToPx(y));
        else ctx.lineTo(xToPx(x), yToPx(y));
      }
      ctx.lineTo(xToPx(s), yToPx(0));
      ctx.lineTo(xToPx(-s), yToPx(0));
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // Label
      const labelY = yToPx(0) + 90 + (band.sigma - 1) * 65;
      ctx.save();
      ctx.globalAlpha = bp;
      ctx.textAlign = 'center';

      ctx.font = 'italic 22px "Georgia", "Times New Roman", serif';
      ctx.fillStyle = '#bcc8d4';
      ctx.textBaseline = 'middle';
      ctx.fillText(`±${s}σ`, xToPx(0), labelY);

      ctx.font = '18px "Georgia", "Times New Roman", serif';
      ctx.fillStyle = '#99aabb';
      ctx.fillText(band.pct, xToPx(0), labelY + 26);

      ctx.restore();
    }

    // ═══════════════════════════ Phase 5: Formula (15.5-18.0s) ═══
    if (t >= 6.0) {
      const fp = expoOut(clamp01((t - 6.0) / 1.2));
      ctx.save();
      ctx.globalAlpha = fp;
      ctx.fillStyle = '#8899aa';
      ctx.font = 'italic 22px "Georgia", "Times New Roman", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('f(x) = 1/(σ√2π) · exp( −(x − μ)² / 2σ² )', W/2, H - 65);
      ctx.restore();
    }
  }

  // ═══════════════════════════════════════════════════════
  // TITLE OVERLAY
  // ═══════════════════════════════════════════════════════
  function updateTitleOverlay(t) {
    if (t < 0.8) {
      const progress = expoOut(clamp01(t / 0.5));
      const opacity = lerp(0, 1, progress);
      const yOffset = lerp(40, 0, progress);
      titleOverlay.style.opacity = opacity;
      titleOverlay.style.marginTop = yOffset + 'px';
    } else if (t < 1.0) {
      // fade out
      const progress = clamp01((t - 0.8) / 0.2);
      titleOverlay.style.opacity = lerp(1, 0, progress);
    } else {
      titleOverlay.style.opacity = '0';
    }

    // Watermark
    if (t > 8.5) {
      const progress = clamp01((t - 8.5) / 0.8);
      watermark.style.opacity = lerp(0, 1, progress);
    } else {
      watermark.style.opacity = '0';
    }
  }

  // ═══════════════════════════════════════════════════════
  // TICK LOOP
  // ═══════════════════════════════════════════════════════
  function tick(now) {
    if (lastTick === null) {
      lastTick = now;
      window.__ready = true;
      draw(0);
      updateTitleOverlay(0);
      requestAnimationFrame(tick);
      return;
    }
    const dt = (now - lastTick) / 1000;
    lastTick = now;

    if (playing) {
      let t = time + dt;
      if (t >= DURATION) {
        t = window.__recording ? DURATION - 0.001 : 0;
      }
      time = t;
      draw(time);
      updateTitleOverlay(time);
      updateControls(time);
    }

    requestAnimationFrame(tick);
  }

  // ═══════════════════════════════════════════════════════
  // CONTROLS
  // ═══════════════════════════════════════════════════════
  function updateControls(t) {
    const sec = t.toFixed(1);
    timeDisplay.textContent = `${sec}s / ${DURATION.toFixed(0)}s`;
    scrubFill.style.width = (t / DURATION * 100).toFixed(2) + '%';
  }

  btnPlay.addEventListener('click', () => {
    playing = !playing;
    btnPlay.textContent = playing ? '⏸ 暂停' : '▶ 播放';
    if (playing) lastTick = null; // reset dt to avoid jump
  });

  btnReplay.addEventListener('click', () => {
    time = 0;
    playing = true;
    lastTick = null;
    btnPlay.textContent = '⏸ 暂停';
    draw(0);
    updateTitleOverlay(0);
    updateControls(0);
  });

  scrubber.addEventListener('click', (e) => {
    const rect = scrubber.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    time = clamp01(ratio) * DURATION;
    playing = false;
    lastTick = null;
    btnPlay.textContent = '▶ 播放';
    draw(time);
    updateTitleOverlay(time);
    updateControls(time);
  });

  // Keyboard controls
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      btnPlay.click();
    } else if (e.code === 'KeyR') {
      btnReplay.click();
    } else if (e.code === 'ArrowRight') {
      time = Math.min(DURATION, time + 0.5);
      draw(time); updateTitleOverlay(time); updateControls(time);
    } else if (e.code === 'ArrowLeft') {
      time = Math.max(0, time - 0.5);
      draw(time); updateTitleOverlay(time); updateControls(time);
    }
  });

  // ── Boot ──
  draw(0);
  updateTitleOverlay(0);
  updateControls(0);
  document.fonts.ready.then(() => {
    requestAnimationFrame(tick);
  });
})();
</script>
</body>
</html>
